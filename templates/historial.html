<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de Entregas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-white border-b border-gray-200 px-4 py-4 sticky top-0 z-10">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <div>
        <h1 class="text-lg font-bold text-gray-800">Historial de Entregas</h1>
        <p id="subtitle" class="text-xs text-gray-400">Cargando...</p>
      </div>
      <button onclick="cargar(true)" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 active:scale-95 transition-transform">
        <span id="btn-icon">⟳</span> Actualizar
      </button>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6" id="content">
    <div class="flex flex-col items-center justify-center mt-20 gap-3">
      <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      <p class="text-gray-400 text-sm">Cargando historial...</p>
    </div>
  </main>

  <p id="last-update" class="text-center text-xs text-gray-300 pb-8"></p>

  <script>
    let cargando = false;

    async function cargar(manual = false) {
      if (cargando) return;
      cargando = true;
      if (manual) {
        document.getElementById('btn-icon').textContent = '↻';
      }

      try {
        const res = await fetch('/api/historial/data');
        if (!res.ok) throw new Error('Error HTTP ' + res.status);
        const days = await res.json();
        renderizar(days);
        const ahora = new Date().toLocaleTimeString('es-EC', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('last-update').textContent = 'Última actualización: ' + ahora;
      } catch (e) {
        document.getElementById('content').innerHTML =
          '<p class="text-center text-red-400 mt-16">No se pudo cargar el historial.<br><span class="text-xs text-gray-400">' + e.message + '</span></p>';
      } finally {
        cargando = false;
        document.getElementById('btn-icon').textContent = '⟳';
      }
    }

    function renderizar(days) {
      const content = document.getElementById('content');
      const subtitle = document.getElementById('subtitle');

      if (!days.length) {
        content.innerHTML = '<p class="text-center text-gray-400 mt-16">No hay entregas registradas todavía.</p>';
        subtitle.textContent = 'Sin entregas';
        return;
      }

      let totalEntregas = 0;
      days.forEach(d => totalEntregas += d.deliveries.length);
      subtitle.textContent = totalEntregas + ' entrega' + (totalEntregas !== 1 ? 's' : '') +
        ' · ' + days.length + ' día' + (days.length !== 1 ? 's' : '');

      content.innerHTML = days.map(day => `
        <div class="mb-8">
          <div class="flex items-center gap-3 mb-3">
            <h2 class="text-sm font-bold text-gray-600 uppercase tracking-wide">${escHtml(day.day_label)}</h2>
            <span class="text-xs bg-blue-100 text-blue-700 font-bold px-2 py-0.5 rounded-full">${day.deliveries.length}</span>
          </div>
          <div class="space-y-2">
            ${day.deliveries.map(d => renderEntrega(d)).join('')}
          </div>
        </div>
      `).join('');
    }

    function renderEntrega(d) {
      const fotos = parseInt(d.photo_count) || 0;
      return `
        <div class="bg-white border border-gray-100 rounded-xl px-4 py-3 shadow-sm flex items-center gap-4">
          <span class="text-blue-600 font-mono font-bold text-sm min-w-[40px]">${escHtml(d.time)}</span>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-gray-800 text-sm truncate">${escHtml(d.client)}</p>
            <p class="text-xs text-gray-400 mt-0.5">${escHtml(d.op)}</p>
          </div>
          <div class="text-right shrink-0">
            <span class="text-xs text-gray-400">${fotos} foto${fotos !== 1 ? 's' : ''}</span>
          </div>
        </div>
      `;
    }

    function escHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    cargar();
    setInterval(cargar, 60000);
  </script>
</body>
</html>
