<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de Entregas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-white border-b border-gray-200 px-4 py-4 sticky top-0 z-10">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <div>
        <h1 class="text-lg font-bold text-gray-800">Historial de Entregas</h1>
        <p id="subtitle" class="text-xs text-gray-400">Cargando...</p>
      </div>
      <button onclick="cargar(true)" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 active:scale-95 transition-transform">
        <span id="btn-icon">⟳</span> Actualizar
      </button>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6" id="content">
    <div class="flex flex-col items-center justify-center mt-20 gap-3">
      <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      <p class="text-gray-400 text-sm">Cargando historial...</p>
    </div>
  </main>

  {% if admin %}
  <div class="max-w-2xl mx-auto px-4 pb-12">
    <div class="border border-dashed border-red-200 rounded-2xl p-5 bg-red-50">
      <p class="text-xs font-bold text-red-400 uppercase tracking-wide mb-4">Zona de pruebas</p>
      <div class="flex flex-col gap-3">
        <button onclick="borrarHoy()"
          class="w-full py-3 rounded-xl border-2 border-orange-300 text-orange-700 font-bold text-sm hover:bg-orange-100 transition-colors">
          🗑 Borrar entregas de hoy
        </button>
        <button onclick="borrarTodo()"
          class="w-full py-3 rounded-xl border-2 border-red-400 text-red-700 font-bold text-sm hover:bg-red-100 transition-colors">
          ⚠️ Borrar TODO el historial
        </button>
      </div>
    </div>
  </div>
  {% endif %}

  <p id="last-update" class="text-center text-xs text-gray-300 pb-4"></p>

  <script>
    let cargando = false;

    async function cargar(manual = false) {
      if (cargando) return;
      cargando = true;
      if (manual) document.getElementById('btn-icon').textContent = '↻';

      try {
        const res = await fetch('/api/historial/data');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const days = await res.json();
        renderizar(days);
        const ahora = new Date().toLocaleTimeString('es-EC', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('last-update').textContent = 'Última actualización: ' + ahora;
      } catch (e) {
        document.getElementById('content').innerHTML =
          '<p class="text-center text-red-400 mt-16">No se pudo cargar el historial.<br><span class="text-xs text-gray-400">' + e.message + '</span></p>';
      } finally {
        cargando = false;
        document.getElementById('btn-icon').textContent = '⟳';
      }
    }

    function renderizar(days) {
      const content  = document.getElementById('content');
      const subtitle = document.getElementById('subtitle');

      if (!days.length) {
        content.innerHTML = '<p class="text-center text-gray-400 mt-16">No hay entregas registradas todavía.</p>';
        subtitle.textContent = 'Sin entregas';
        return;
      }

      let total = 0;
      days.forEach(d => total += d.deliveries.length);
      subtitle.textContent = total + ' entrega' + (total !== 1 ? 's' : '') +
        ' · ' + days.length + ' día' + (days.length !== 1 ? 's' : '');

      content.innerHTML = days.map(day => `
        <div class="mb-8">
          <div class="flex items-center gap-3 mb-3">
            <h2 class="text-sm font-bold text-gray-600 uppercase tracking-wide">${escHtml(day.day_label)}</h2>
            <span class="text-xs bg-blue-100 text-blue-700 font-bold px-2 py-0.5 rounded-full">${day.deliveries.length}</span>
          </div>
          <div class="space-y-2">
            ${day.deliveries.map(d => renderEntrega(d)).join('')}
          </div>
        </div>
      `).join('');
    }

    function renderEntrega(d) {
      const fotos = parseInt(d.photo_count) || 0;
      return `
        <div class="bg-white border border-gray-100 rounded-xl px-4 py-3 shadow-sm flex items-center gap-4">
          <span class="text-blue-600 font-mono font-bold text-sm min-w-[40px]">${escHtml(d.time)}</span>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-gray-800 text-sm truncate">${escHtml(d.client)}</p>
            <p class="text-xs text-gray-400 mt-0.5">${escHtml(d.op)}</p>
          </div>
          <span class="text-xs text-gray-400 shrink-0">${fotos} foto${fotos !== 1 ? 's' : ''}</span>
        </div>
      `;
    }

    async function borrarHoy() {
      if (!confirm('¿Borrar todas las entregas de HOY?')) return;
      await borrar('?solo_hoy=1');
    }

    async function borrarTodo() {
      if (!confirm('¿Borrar TODO el historial? Esta acción es irreversible.')) return;
      await borrar('');
    }

    async function borrar(params) {
      try {
        const res  = await fetch('/api/historial/borrar' + params, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          alert('Listo. Se borraron ' + data.deleted + ' entradas.');
          cargar(true);
        } else {
          alert('Error: ' + data.error);
        }
      } catch (e) {
        alert('Error de conexión: ' + e.message);
      }
    }

    function escHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    cargar();
    setInterval(cargar, 60000);
  </script>
</body>
</html>
