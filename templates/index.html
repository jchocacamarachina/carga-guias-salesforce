<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga de Guías</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-blue-600">
        <h1 class="text-xl font-black text-center text-gray-800 mb-6 uppercase tracking-wider">Guías de Entrega</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="p-4 mb-6 rounded-lg font-bold text-center {% if category == 'success' %}bg-green-50 text-green-700 border border-green-200{% else %}bg-red-50 text-red-700 border border-red-200{% endif %}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Paso 1: Buscar Orden</label>
                <div class="flex gap-2">
                    <div class="flex flex-1 shadow-sm">
                        <span class="inline-flex items-center px-3 bg-gray-100 border border-r-0 border-gray-300 rounded-l-lg text-gray-500 font-bold">OP-</span>
                        <input type="text" id="order_number_input" placeholder="00077845" class="flex-1 border-gray-300 border p-3 rounded-r-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <button type="button" onclick="buscarOrden()" class="bg-blue-600 text-white px-4 rounded-lg font-bold hover:bg-blue-700 transition-colors">Buscar</button>
                </div>
                <p id="op_name_display" class="mt-3 text-sm font-bold text-gray-700 bg-gray-50 p-2 rounded hidden border border-dashed border-gray-300"></p>
            </div>

            <hr class="border-gray-100">

            <form id="upload_form" action="/upload" method="POST" enctype="multipart/form-data" class="space-y-6 opacity-30 pointer-events-none transition-opacity duration-500">
                <input type="hidden" name="order_number" id="hidden_order_number">
                
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Paso 2: Foto de la Guía</label>
                    <input type="file" name="photo" id="photo_input" accept="image/*" capture="environment" class="block w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-4 file:rounded-lg file:border-0 file:bg-blue-100 file:text-blue-700 font-bold">
                </div>

                <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-green-700 transition-all">
                    GUARDAR FOTO
                </button>
            </form>
        </div>
    </div>

    <script>
        function buscarOrden() {
            const num = document.getElementById('order_number_input').value.trim();
            const display = document.getElementById('op_name_display');
            const form = document.getElementById('upload_form');
            const hiddenInput = document.getElementById('hidden_order_number');

            if(!num) return alert("Ingresa un número");

            display.classList.remove('hidden');
            display.innerText = "🔍 Buscando...";
            display.style.color = "#4b5563";

            fetch(`/get_order_name/${num}`)
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        display.innerText = "✅ Orden: " + data.name;
                        display.style.color = "#059669";
                        // Activar formulario
                        form.classList.remove('opacity-30', 'pointer-events-none');
                        hiddenInput.value = num;
                    } else {
                        display.innerText = "❌ Orden no encontrada";
                        display.style.color = "#dc2626";
                        form.classList.add('opacity-30', 'pointer-events-none');
                    }
                });
        }
    </script>
</body>
</html>
