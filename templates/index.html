<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carga de Guías</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

  <!-- Pantalla de éxito -->
  <div id="success_overlay" class="hidden fixed inset-0 bg-green-600 z-50 flex flex-col items-center justify-center p-8 text-center">
    <div class="text-white">
      <div class="text-9xl mb-2 leading-none">✓</div>
      <h2 class="text-3xl font-black mb-3">¡Fotos guardadas!</h2>
      <p id="success_ops" class="text-green-100 text-base font-bold mb-2"></p>
      <p class="text-green-200 text-sm mb-8">Las fotos quedaron registradas en el sistema.</p>
      <button onclick="dismissSuccess()"
        class="bg-white text-green-700 font-black text-lg px-10 py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
        Nueva entrega
      </button>
      <p id="success_countdown" class="text-green-300 text-xs mt-5"></p>
    </div>
  </div>

  <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-xl border-t-8 border-blue-600">
    <h1 class="text-xl font-black text-center text-gray-800 mb-6 uppercase tracking-wider">
      Guías de Entrega
    </h1>

    <div class="space-y-6">
      <!-- Paso 1 -->
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Paso 1: Buscar Orden</label>

        <div class="flex gap-2">
          <div class="flex flex-1 shadow-sm">
            <span class="inline-flex items-center px-3 bg-gray-100 border border-r-0 border-gray-300 rounded-l-lg text-gray-500 font-bold">OP-</span>
            <input
              type="text"
              id="order_number_input"
              placeholder="13563"
              inputmode="numeric"
              class="flex-1 border-gray-300 border p-3 rounded-r-lg focus:ring-2 focus:ring-blue-500 outline-none"
            />
          </div>
          <button type="button" onclick="buscarOrdenPrimera()"
            class="bg-blue-600 text-white px-4 rounded-lg font-bold hover:bg-blue-700 transition-colors">
            Buscar
          </button>
        </div>

        <p id="op_name_display" class="mt-3 text-sm font-bold text-gray-700 bg-gray-50 p-2 rounded hidden border border-dashed border-gray-300"></p>

        <!-- Lista de órdenes seleccionadas -->
        <div class="mt-4">
          <div class="flex items-center justify-between">
            <p class="text-xs font-bold text-gray-500 uppercase">Órdenes seleccionadas</p>
            <button id="add_order_btn" type="button"
              class="text-xs font-black text-blue-600 hover:underline disabled:opacity-40 disabled:cursor-not-allowed"
              disabled>
              + Agregar otra OP
            </button>
          </div>

          <div id="orders_list" class="mt-2 space-y-2"></div>

          <!-- Input inline para agregar otra OP -->
          <div id="add_order_row" class="hidden mt-3">
            <div class="flex gap-2">
              <div class="flex flex-1 shadow-sm">
                <span class="inline-flex items-center px-3 bg-gray-100 border border-r-0 border-gray-300 rounded-l-lg text-gray-500 text-sm font-bold">OP-</span>
                <input
                  type="text"
                  id="add_order_input"
                  placeholder="13639"
                  inputmode="numeric"
                  class="flex-1 border-gray-300 border p-2 rounded-r-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                />
              </div>
              <button type="button" id="confirm_add_btn"
                class="bg-blue-600 text-white px-3 rounded-lg font-bold hover:bg-blue-700 text-sm">
                Agregar
              </button>
              <button type="button" id="cancel_add_btn"
                class="bg-gray-100 text-gray-600 px-3 rounded-lg font-bold hover:bg-gray-200 text-sm">
                ✕
              </button>
            </div>
            <p id="add_order_error" class="mt-1 text-xs text-red-600 hidden"></p>
          </div>

          <p id="client_hint" class="mt-2 text-xs text-gray-500 hidden">
            Todas las OP deben ser del mismo cliente.
          </p>
        </div>
      </div>

      <hr class="border-gray-100" />

      <!-- Paso 2 + 3 -->
      <form id="upload_form" class="space-y-6 opacity-30 pointer-events-none transition-opacity duration-500">
        <input type="hidden" name="order_numbers_json" id="hidden_orders_json" />

        <!-- Captura por cámara -->
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Paso 2: Tomar Fotos</label>

          <div class="flex gap-3">
            <button id="take_photo_btn" type="button"
              class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-black shadow-lg hover:bg-blue-700 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
              TOMAR FOTO
            </button>

            <button id="clear_photos_btn" type="button"
              class="bg-gray-100 text-gray-700 py-3 px-4 rounded-xl font-black hover:bg-gray-200 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
              LIMPIAR
            </button>
          </div>

          <p class="text-xs text-gray-500 mt-2">
            Se abre la cámara y cada foto tomada se agrega a la cola. Puedes borrar antes de subir.
          </p>

          <input type="file" id="camera_input" accept="image/*" capture="environment"
            style="position:fixed;top:-200px;left:-200px;width:1px;height:1px;opacity:0;" />
        </div>

        <!-- Preview -->
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Previsualización</label>
          <div id="preview_grid" class="grid grid-cols-3 gap-3 hidden"></div>
          <p id="empty_preview" class="text-sm text-gray-500 bg-gray-50 border border-dashed rounded-lg p-3">
            Aún no seleccionas fotos.
          </p>
        </div>

        <button id="submit_btn" type="button" disabled
          class="w-full bg-green-600 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-green-700 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
          SUBIR FOTOS
        </button>

        <!-- Estado -->
        <div class="bg-slate-50 border rounded-xl p-4">
          <div class="flex items-center justify-between mb-2">
            <p class="font-black text-gray-700">Estado</p>
            <button id="clear_log" type="button" class="text-xs font-bold text-blue-600 hover:underline">Limpiar</button>
          </div>
          <div id="status_log" class="text-sm text-gray-700 space-y-1 max-h-56 overflow-auto"></div>
        </div>
      </form>
    </div>
  </div>

  <script>
    const input          = document.getElementById('order_number_input');
    const display        = document.getElementById('op_name_display');
    const form           = document.getElementById('upload_form');
    const hiddenOrdersJson = document.getElementById('hidden_orders_json');
    const addOrderBtn    = document.getElementById('add_order_btn');
    const addOrderRow    = document.getElementById('add_order_row');
    const addOrderInput  = document.getElementById('add_order_input');
    const confirmAddBtn  = document.getElementById('confirm_add_btn');
    const cancelAddBtn   = document.getElementById('cancel_add_btn');
    const addOrderError  = document.getElementById('add_order_error');
    const ordersList     = document.getElementById('orders_list');
    const clientHint     = document.getElementById('client_hint');
    const cameraInput    = document.getElementById('camera_input');
    const takePhotoBtn   = document.getElementById('take_photo_btn');
    const clearPhotosBtn = document.getElementById('clear_photos_btn');
    const previewGrid    = document.getElementById('preview_grid');
    const emptyPreview   = document.getElementById('empty_preview');
    const submitBtn      = document.getElementById('submit_btn');
    const statusLog      = document.getElementById('status_log');
    const clearLogBtn    = document.getElementById('clear_log');

    let selectedFiles  = [];
    let sse            = null;
    let selectedOrders = []; // [{raw, op, name, client_name, has_delivery_url}]
    let clientNameRef  = null;

    // ====== Utilidades ======
    function soloDigitos(val) {
      return val.replace(/[^0-9]/g, '').trim();
    }

    function bloquearForm() {
      form.classList.add('opacity-30', 'pointer-events-none');
      submitBtn.disabled = true;
      selectedFiles = [];
      renderPreview();
      resetCompactLog();
    }

    function habilitarForm() {
      form.classList.remove('opacity-30', 'pointer-events-none');
      updateSubmitState();
    }

    function resetAll() {
      sessionStorage.removeItem('cc_orders');
      sessionStorage.removeItem('cc_client');
      selectedOrders = [];
      clientNameRef  = null;
      hiddenOrdersJson.value = "";
      input.value    = "";
      display.classList.add("hidden");
      display.innerText = "";
      addOrderRow.classList.add("hidden");
      addOrderInput.value = "";
      addOrderError.classList.add("hidden");
      selectedFiles  = [];
      renderPreview();
      renderOrders();
      bloquearForm();
      resetCompactLog();
    }

    // ====== Logger compacto (máx 4 pasos) ======
    const steps = {
      start:  { order: 1 },
      upload: { order: 2 },
      sf:     { order: 3 },
      done:   { order: 4 }
    };
    const stepState = { start: null, upload: null, sf: null, done: null };

    function resetCompactLog() {
      stepState.start = stepState.upload = stepState.sf = stepState.done = null;
      renderCompactLog();
    }

    function setStep(key, text, kind = "info") {
      if (!steps[key]) return;
      stepState[key] = { text, kind };
      renderCompactLog();
    }

    function renderCompactLog() {
      statusLog.innerHTML = "";
      Object.keys(steps).sort((a, b) => steps[a].order - steps[b].order).forEach(k => {
        const item = stepState[k];
        if (!item) return;
        const el = document.createElement("div");
        el.className = "leading-snug";
        if (item.kind === "error") el.classList.add("text-red-700", "font-bold");
        if (item.kind === "warn")  el.classList.add("text-amber-700", "font-bold");
        if (item.kind === "done")  el.classList.add("text-green-700", "font-bold");
        el.textContent = item.text;
        statusLog.appendChild(el);
      });
    }

    function handleBackendMsg(msg, kind = "info") {
      const raw = (msg || "").trim();
      const m   = raw.toLowerCase();

      if (m.includes("verificando") && m.includes("salesforce")) {
        setStep("start", "🔎 Verificando órdenes...");
        return;
      }
      if (m.includes("órdenes verificadas")) {
        setStep("start", raw, "done");
        return;
      }
      if (m.includes("orden no encontrada") || m.includes("no pertenecen al mismo cliente")) {
        setStep("done", "❌ Revisa las órdenes.", "error");
        return;
      }
      if (m.includes("subiendo")) {
        const match = raw.match(/subiendo\s+(\d+)\/(\d+)/i);
        if (match) setStep("upload", `⬆️ Subiendo fotos (${match[1]}/${match[2]})...`);
        else       setStep("upload", "⬆️ Subiendo fotos...");
        return;
      }
      if (m.includes("guardando link en salesforce")) {
        setStep("sf", "🧾 Guardando en Salesforce...");
        return;
      }
      if (m.includes("guardado en salesforce")) {
        setStep("sf", raw, "done");
        return;
      }
      if (m.includes("make no respondió") || m.includes("no se pudo hacer público")) return;

      if (kind === "error" || m.startsWith("⚠️ error") || m.startsWith("error")) {
        setStep("done", "❌ Ocurrió un error.", "error");
        return;
      }
    }

    clearLogBtn.addEventListener("click", () => resetCompactLog());

    // ====== Órdenes UI ======
    function renderOrders() {
      ordersList.innerHTML = "";

      if (!selectedOrders.length) {
        ordersList.innerHTML = `<div class="text-sm text-gray-500 bg-gray-50 border border-dashed rounded-lg p-3">
          Aún no has seleccionado una orden.
        </div>`;
        addOrderBtn.disabled = true;
        clientHint.classList.add("hidden");
        return;
      }

      addOrderBtn.disabled = false;
      clientHint.classList.remove("hidden");

      selectedOrders.forEach((o, idx) => {
        const card = document.createElement("div");
        card.className = "bg-gray-50 border rounded-lg p-3";

        const row = document.createElement("div");
        row.className = "flex items-center justify-between";

        const left = document.createElement("div");
        left.className = "min-w-0";
        left.innerHTML = `
          <div class="text-sm font-black text-gray-800 truncate">${o.op}</div>
          <div class="text-xs text-gray-500 font-bold truncate">${o.name || ""}</div>
        `;

        if (o.has_delivery_url) {
          const warn = document.createElement("div");
          warn.className = "text-xs text-amber-600 font-bold mt-1";
          warn.textContent = "⚠️ Ya tiene guía de entrega (se sobreescribirá)";
          left.appendChild(warn);
        }

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "ml-3 shrink-0 text-xs font-black text-red-600 hover:underline";
        btn.textContent = "Quitar";
        btn.onclick = () => {
          selectedOrders.splice(idx, 1);
          if (!selectedOrders.length) {
            clientNameRef = null;
            hiddenOrdersJson.value = "";
            addOrderRow.classList.add("hidden");
            bloquearForm();
          } else {
            clientNameRef = selectedOrders[0].client_name;
            syncHiddenOrders();
            habilitarForm();
          }
          renderOrders();
          updateSubmitState();
        };

        row.appendChild(left);
        row.appendChild(btn);
        card.appendChild(row);
        ordersList.appendChild(card);
      });

      syncHiddenOrders();
    }

    function syncHiddenOrders() {
      hiddenOrdersJson.value = JSON.stringify(selectedOrders.map(o => o.raw));
    }

    async function fetchOrderInfo(rawNumber) {
      const res = await fetch(`/get_order_info/${encodeURIComponent(rawNumber)}`);
      return await res.json();
    }

    async function buscarOrdenPrimera() {
      const num = soloDigitos(input.value);
      if (!num) return;

      display.classList.remove('hidden');
      display.innerText = "🔍 Buscando...";
      display.style.color = "#4b5563";

      bloquearForm();

      try {
        const data = await fetchOrderInfo(num);

        if (!data.success) {
          display.innerText = "❌ Orden no encontrada";
          display.style.color = "#dc2626";
          selectedOrders = [];
          clientNameRef  = null;
          renderOrders();
          return;
        }

        selectedOrders = [{
          raw: num,
          op:  data.op,
          name: data.name,
          client_name: data.client_name,
          has_delivery_url: data.has_delivery_url,
        }];
        clientNameRef = data.client_name;

        display.innerText = "✅ Orden: " + (data.name || data.op);
        display.style.color = "#059669";

        renderOrders();
        habilitarForm();
        resetCompactLog();
      } catch {
        display.innerText = "⚠️ Error consultando la orden";
        display.style.color = "#dc2626";
        selectedOrders = [];
        clientNameRef  = null;
        renderOrders();
      }
    }

    // Enter en el input principal lanza la búsqueda
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") buscarOrdenPrimera();
    });

    // ====== Agregar otra OP (inline) ======
    addOrderBtn.addEventListener("click", () => {
      addOrderRow.classList.remove("hidden");
      addOrderError.classList.add("hidden");
      addOrderInput.value = "";
      addOrderInput.focus();
    });

    cancelAddBtn.addEventListener("click", () => {
      addOrderRow.classList.add("hidden");
      addOrderError.classList.add("hidden");
    });

    async function agregarOtroOp() {
      const num = soloDigitos(addOrderInput.value);
      if (!num) return;

      addOrderError.classList.add("hidden");

      if (selectedOrders.some(o => soloDigitos(o.raw) === num)) {
        addOrderError.textContent = "Esa OP ya está agregada.";
        addOrderError.classList.remove("hidden");
        return;
      }

      confirmAddBtn.disabled = true;
      confirmAddBtn.textContent = "...";

      try {
        const data = await fetchOrderInfo(num);

        if (!data.success) {
          addOrderError.textContent = "Orden no encontrada.";
          addOrderError.classList.remove("hidden");
          return;
        }

        if (!data.client_name) {
          addOrderError.textContent = "Esa orden no tiene cliente asignado.";
          addOrderError.classList.remove("hidden");
          return;
        }

        if (clientNameRef && data.client_name !== clientNameRef) {
          addOrderError.textContent = "Esa OP es de otro cliente. No se puede agregar.";
          addOrderError.classList.remove("hidden");
          return;
        }

        selectedOrders.push({
          raw: num,
          op:  data.op,
          name: data.name,
          client_name: data.client_name,
          has_delivery_url: data.has_delivery_url,
        });

        clientNameRef = selectedOrders[0].client_name;
        addOrderRow.classList.add("hidden");
        addOrderInput.value = "";
        addOrderError.classList.add("hidden");
        renderOrders();
        updateSubmitState();
      } catch {
        addOrderError.textContent = "Error consultando la orden.";
        addOrderError.classList.remove("hidden");
      } finally {
        confirmAddBtn.disabled = false;
        confirmAddBtn.textContent = "Agregar";
      }
    }

    confirmAddBtn.addEventListener("click", agregarOtroOp);

    addOrderInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") agregarOtroOp();
      if (e.key === "Escape") {
        addOrderRow.classList.add("hidden");
        addOrderError.classList.add("hidden");
      }
    });

    // ====== Fotos ======
    function updateSubmitState() {
      const okOrders = selectedOrders.length > 0;
      const okFiles  = selectedFiles.length > 0;
      submitBtn.disabled    = !(okOrders && okFiles);
      clearPhotosBtn.disabled = !(okOrders && okFiles);
      takePhotoBtn.disabled = !okOrders;
    }

    function renderPreview() {
      previewGrid.innerHTML = "";

      if (!selectedFiles.length) {
        emptyPreview.classList.remove("hidden");
        previewGrid.classList.add("hidden");
        updateSubmitState();
        return;
      }

      emptyPreview.classList.add("hidden");
      previewGrid.classList.remove("hidden");

      selectedFiles.forEach((file, idx) => {
        const card = document.createElement("div");
        card.className = "relative rounded-xl overflow-hidden border bg-white shadow-sm";

        const img = document.createElement("img");
        img.className = "w-full h-28 object-cover";
        img.src = URL.createObjectURL(file);

        const footer = document.createElement("div");
        footer.className = "p-2 text-xs text-gray-600 font-bold truncate";
        footer.title = file.name;
        footer.textContent = file.name;

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "absolute top-2 right-2 bg-black/70 text-white w-7 h-7 rounded-full font-black hover:bg-black";
        btn.textContent = "×";
        btn.onclick = () => { selectedFiles.splice(idx, 1); renderPreview(); };

        card.appendChild(img);
        card.appendChild(btn);
        card.appendChild(footer);
        previewGrid.appendChild(card);
      });

      updateSubmitState();
    }

    function abrirCamara() {
      if (!selectedOrders.length) return;
      sessionStorage.setItem('cc_orders', JSON.stringify(selectedOrders));
      sessionStorage.setItem('cc_client', clientNameRef || '');

      // Crear un input nuevo cada vez; reusar el mismo con display:none
      // hace que el evento change no dispare en muchos Android.
      const inp = document.createElement('input');
      inp.type = 'file';
      inp.accept = 'image/*';
      inp.capture = 'environment';
      inp.style.cssText = 'position:fixed;top:-200px;left:-200px;width:1px;height:1px;opacity:0;';
      document.body.appendChild(inp);

      inp.addEventListener('change', () => {
        const file = inp.files?.[0];
        if (document.body.contains(inp)) document.body.removeChild(inp);
        if (!file || !(file.type || '').startsWith('image/')) return;
        const ext   = (file.name.split('.').pop() || 'jpg').toLowerCase();
        const stamp = new Date().toISOString().replace(/[:.]/g, '-');
        const renamed = new File([file], `foto_${stamp}.${ext}`, { type: file.type, lastModified: Date.now() });
        selectedFiles.push(renamed);
        renderPreview();
      });

      // Limpieza si el usuario cancela sin seleccionar
      window.addEventListener('focus', function cleanup() {
        window.removeEventListener('focus', cleanup);
        setTimeout(() => {
          if (document.body.contains(inp)) document.body.removeChild(inp);
        }, 500);
      }, { once: true });

      inp.click();
    }

    takePhotoBtn.addEventListener("click", abrirCamara);

    clearPhotosBtn.addEventListener("click", () => {
      selectedFiles = [];
      renderPreview();
      resetCompactLog();
    });

    // ====== Submit ======
    submitBtn.addEventListener("click", async () => {
      if (submitBtn.disabled) return;
      if (sse) { sse.close(); sse = null; }

      resetCompactLog();
      setStep("start", "⏳ Iniciando...");

      const fd = new FormData();
      fd.append("order_numbers_json", hiddenOrdersJson.value || "[]");
      selectedFiles.forEach(f => fd.append("photos", f, f.name));

      submitBtn.disabled = true;

      try {
        const res  = await fetch("/start_upload", { method: "POST", body: fd });
        const data = await res.json();

        if (!data.success) {
          setStep("done", "❌ No se pudo iniciar la subida.", "error");
          updateSubmitState();
          return;
        }

        sse = new EventSource(`/progress/${data.job_id}`);

        sse.addEventListener("message", (e) => handleBackendMsg(e.data, "info"));
        sse.addEventListener("warn",    (e) => handleBackendMsg(e.data, "warn"));
        sse.addEventListener("error",   (e) => handleBackendMsg(e.data, "error"));
        sse.addEventListener("done",    (e) => handleBackendMsg(e.data, "done"));

        sse.addEventListener("final", (e) => {
          if (sse) { sse.close(); sse = null; }
          try {
            const payload = JSON.parse(e.data);
            if (payload.ok) {
              const orders = (payload.result?.orders || []).map(o => o.order_number);
              showSuccess(orders);
            } else {
              setStep("done", "❌ Terminó con error.", "error");
              updateSubmitState();
            }
          } catch {
            setStep("done", "⚠️ Final recibido, pero no se pudo leer.", "warn");
            updateSubmitState();
          }
        });

      } catch {
        setStep("done", "❌ Error de red.", "error");
        submitBtn.textContent = "SUBIR FOTOS";
        updateSubmitState();
      }
    });

    // ====== Pantalla de éxito ======
    let _successTimer = null;

    function showSuccess(orderNumbers) {
      const overlay = document.getElementById('success_overlay');
      const opsEl   = document.getElementById('success_ops');
      const cdEl    = document.getElementById('success_countdown');

      opsEl.textContent = orderNumbers.length
        ? orderNumbers.join(" · ")
        : "";

      overlay.classList.remove('hidden');

      let secs = 6;
      cdEl.textContent = `Se cerrará solo en ${secs} seg.`;
      _successTimer = setInterval(() => {
        secs--;
        cdEl.textContent = `Se cerrará solo en ${secs} seg.`;
        if (secs <= 0) dismissSuccess();
      }, 1000);
    }

    function dismissSuccess() {
      if (_successTimer) { clearInterval(_successTimer); _successTimer = null; }
      document.getElementById('success_overlay').classList.add('hidden');
      resetAll();
    }

    // Init
    bloquearForm();
    renderOrders();

    // Si Android recargó la página al volver de la cámara, restaurar órdenes
    (function () {
      const saved = sessionStorage.getItem('cc_orders');
      if (!saved) return;
      try {
        const orders = JSON.parse(saved);
        if (!Array.isArray(orders) || !orders.length) return;
        selectedOrders = orders;
        clientNameRef  = sessionStorage.getItem('cc_client') || null;
        const first    = orders[0];
        input.value    = first.raw || '';
        display.innerText   = "✅ Orden: " + (first.name || first.op);
        display.style.color = "#059669";
        display.classList.remove('hidden');
        renderOrders();
        habilitarForm();
      } catch {}
    })();
  </script>
</body>
</html>
