<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de Entregas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <div class="bg-white border-b shadow-sm">
    <div class="max-w-xl mx-auto px-4 py-3 flex items-center justify-between">
      <p class="font-black text-gray-800">Control de Entregas</p>
      <div class="text-right">
        <p id="fecha_hoy" class="text-sm font-bold text-gray-600"></p>
        <span id="sync_dot" class="text-xs text-gray-400">—</span>
      </div>
    </div>
  </div>

  <div class="max-w-xl mx-auto px-4 py-5">

    <!-- Pegar lista -->
    <div id="input_section" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
      <p class="font-black text-gray-700 mb-1">Lista de entregas del día</p>
      <p class="text-xs text-gray-400 mb-3">Pegá los nombres, uno por línea o separados por coma.</p>
      <textarea id="names_input"
        placeholder="JUAN CHOCA&#10;EDISON DOMINGUEZ&#10;MARIA LOPEZ"
        class="w-full border border-gray-200 rounded-xl p-3 text-sm font-mono resize-none h-40 focus:ring-2 focus:ring-blue-500 outline-none"
      ></textarea>
      <button onclick="cargarLista()"
        class="mt-3 bg-blue-600 text-white px-4 py-3 rounded-xl font-black text-sm hover:bg-blue-700 transition-colors w-full">
        Cargar lista
      </button>
    </div>

    <!-- Checklist activo -->
    <div id="checklist_section" class="hidden space-y-4">

      <!-- Contador + barra -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 text-center">
        <p id="counter_big" class="text-6xl font-black leading-none text-gray-800"></p>
        <p id="counter_sub" class="text-sm font-bold text-gray-400 mt-2"></p>
        <div class="mt-4 bg-gray-100 rounded-full h-3 overflow-hidden">
          <div id="progress_bar"
            class="bg-green-500 h-3 rounded-full transition-all duration-700"
            style="width:0%"></div>
        </div>
      </div>

      <!-- Lista de nombres -->
      <div id="names_grid" class="space-y-2"></div>

      <button onclick="limpiarLista()"
        class="w-full text-sm font-bold text-gray-400 hover:text-red-500 py-2 transition-colors">
        Cambiar lista
      </button>

      {% if admin %}
      <button onclick="resetPrueba()"
        class="w-full text-sm font-bold text-red-400 border border-dashed border-red-300 rounded-xl py-2 hover:bg-red-50 transition-colors">
        🗑 Borrar lista (prueba)
      </button>
      {% endif %}

    </div>

  </div>

  <script>
    let names     = [];
    let pollTimer = null;

    (function mostrarFecha() {
      const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
      const hoyDate = new Date();
      document.getElementById('fecha_hoy').textContent =
        `${hoyDate.getDate()} de ${meses[hoyDate.getMonth()]} de ${hoyDate.getFullYear()}`;
    })();

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function norm(n) {
      return (n || '').trim().toUpperCase().replace(/\s+/g, ' ');
    }

    function parsePastedNames(text) {
      const seen = new Set();
      return text.split(/[\n,;]+/)
        .map(n => norm(n))
        .filter(n => {
          if (!n || seen.has(n)) return false;
          seen.add(n);
          return true;
        });
    }

    function findMatch(name, map) {
      if (map[name]) return map[name];
      for (const [key, val] of Object.entries(map)) {
        if (key.includes(name) || name.includes(key)) return val;
      }
      return null;
    }

    function hoy() {
      return new Date().toISOString().slice(0, 10); // "2026-06-24"
    }

    function cargarLista() {
      const parsed = parsePastedNames(document.getElementById('names_input').value);
      if (!parsed.length) return;
      names = parsed;
      localStorage.setItem('luis_lista', JSON.stringify({ date: hoy(), names }));
      document.getElementById('input_section').classList.add('hidden');
      document.getElementById('checklist_section').classList.remove('hidden');
      startPolling();
    }

    function limpiarLista() {
      stopPolling();
      document.getElementById('names_input').value = names.join('\n');
      localStorage.removeItem('luis_lista');
      names = [];
      document.getElementById('checklist_section').classList.add('hidden');
      document.getElementById('input_section').classList.remove('hidden');
    }

    async function fetchAndUpdate() {
      try {
        const res  = await fetch('/api/history');
        const data = await res.json();
        renderCards(data);
        document.getElementById('sync_dot').textContent = 'en vivo ●';
        document.getElementById('sync_dot').className = 'text-xs text-green-500';
      } catch {
        document.getElementById('sync_dot').textContent = 'sin conexión';
        document.getElementById('sync_dot').className = 'text-xs text-red-400';
      }
    }

    function renderCards(history) {
      // Mapa: nombre normalizado → { time }
      const map = {};
      history.forEach(e => {
        const k = norm(e.client);
        if (k && !map[k]) map[k] = { time: e.time, date: e.date };
      });

      let doneCount = 0;
      const total   = names.length;

      const grid = document.getElementById('names_grid');
      grid.innerHTML = names.map(name => {
        const match = findMatch(name, map);
        if (match) doneCount++;

        return match
          ? `<div class="bg-green-50 border border-green-300 rounded-xl px-4 py-3 flex items-center gap-3">
               <span class="text-xl shrink-0">✅</span>
               <div class="flex-1 min-w-0">
                 <p class="font-bold text-green-800 text-sm truncate">${esc(name)}</p>
                 <p class="text-xs text-green-600 mt-0.5">${esc(match.time)}</p>
               </div>
             </div>`
          : `<div class="bg-white border border-gray-200 rounded-xl px-4 py-3 flex items-center gap-3">
               <span class="text-xl shrink-0">⏳</span>
               <p class="font-bold text-gray-500 text-sm truncate flex-1">${esc(name)}</p>
             </div>`;
      }).join('');

      const pending = total - doneCount;
      const pct     = total > 0 ? Math.round((doneCount / total) * 100) : 0;

      const bigEl = document.getElementById('counter_big');
      const subEl = document.getElementById('counter_sub');

      if (doneCount === total && total > 0) {
        bigEl.textContent  = '✓';
        bigEl.className    = 'text-5xl font-black leading-none text-green-600';
        subEl.textContent  = 'Todos entregados';
      } else {
        bigEl.textContent  = pending;
        bigEl.className    = 'text-6xl font-black leading-none text-gray-800';
        subEl.textContent  = `${doneCount} de ${total} entregados`;
      }

      document.getElementById('progress_bar').style.width = pct + '%';
    }

    function resetPrueba() {
      if (!confirm('¿Limpiar la lista del supervisor?')) return;
      stopPolling();
      localStorage.removeItem('luis_lista');
      names = [];
      document.getElementById('names_input').value = '';
      document.getElementById('checklist_section').classList.add('hidden');
      document.getElementById('input_section').classList.remove('hidden');
    }

    function startPolling() {
      fetchAndUpdate();
      pollTimer = setInterval(fetchAndUpdate, 5000);
    }

    function stopPolling() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }

    // Restaurar lista al recargar (solo si es del mismo día)
    (function () {
      const saved = localStorage.getItem('luis_lista');
      if (!saved) return;
      try {
        const obj = JSON.parse(saved);
        if (obj.date !== hoy()) {
          localStorage.removeItem('luis_lista');
          return;
        }
        if (Array.isArray(obj.names) && obj.names.length) {
          names = obj.names;
          document.getElementById('input_section').classList.add('hidden');
          document.getElementById('checklist_section').classList.remove('hidden');
          startPolling();
        }
      } catch {}
    })();
  </script>

</body>
</html>
